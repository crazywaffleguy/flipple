<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f2b24" />

  <!--

  -->
  <title>Flipple</title>
  <meta name="description" content="A unique take on the Wordle-like genre that combines elements of the addicting daily challenges brought by games like Wordle and Connections with the iconic code breaking aspects from beloved board games such as Mastermind. Its a flipping great game if you ask me!" />
  <meta name="author" content="crazywaffleguy" />

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1984816840900426"
     crossorigin="anonymous"></script>

  <!-- Social preview: intentionally green/yellow only so Flipple³ is not spoiled. -->
  <meta property="og:title" content="flipple" />
  <meta property="og:description" content="A unique take on the Wordle-like genre that combines elements of the addicting daily challenges brought by games like Wordle and Connections with the iconic code breaking aspects from beloved board games such as Mastermind. Its a flipping great game if you ask me!" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://flipple.live" />
  <meta property="og:image" content="https://flipple.live/assets/preview.png?v=0.2.3" />
  <meta name="twitter:image" content="https://flipple.live/assets/preview.png?v=0.2.3" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://flipple.live" />

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/assets/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Flipple" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="dark" data-hard="false">
  <div class="wrap">
    <header class="header" aria-label="Flipple header">
      <div class="title-wrap">
        <h1 id="title" aria-label="flipple">flipple<span class="cube" aria-hidden="true">3</span></h1>
      </div>

      <div class="top">
        <div class="icons" aria-label="settings">
          <button class="icon" id="theme" type="button" aria-label="toggle light and dark mode"></button>
          <button class="icon" id="mode" type="button" aria-label="toggle normal and cubed mode">
            <span class="mode-text">II</span>
          </button>
        </div>
        <div class="tries" id="tries" aria-label="guesses left"></div>
      </div>
    </header>

    <main class="game daily" id="game" data-actions="daily" aria-label="Flipple game">
      <div class="meta-row" aria-label="local progress and daily puzzle">
        <div class="win-meta" id="winMeta" aria-label="wins"></div>
        <button class="daily-meta" id="dailyMeta" type="button" aria-live="polite" aria-label="daily puzzle number"></button>
      </div>

      <div class="board" id="board"></div>

      <div class="actions">
        <button class="action check" id="submit" type="button" aria-label="submit guess">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="5 13 10 18 20 6"></polyline>
          </svg>
        </button>
        <button class="action reset" id="reset" type="button" aria-label="new practice puzzle" hidden>↻</button>
      </div>

      <div class="result" id="result" aria-live="polite"></div>
      <div class="history" id="history" aria-label="guess history"></div>
      <div class="secret" id="secret" aria-label="secret pattern"></div>

      <div class="after" id="after" aria-live="polite">
        <button class="share" id="share" type="button">share</button>
        <button class="practice-entry" id="practice" type="button" hidden>practice</button>
      </div>

      <div class="streak-line" id="streak" aria-label="local streak">streak - 0</div>
    </main>
  </div>

  <a class="creator-link" href="https://linktr.ee/crazywaffleguy" target="_blank" rel="noopener noreferrer">meet the creator</a>
  <div class="version-label" id="versionLabel" aria-label="Flipple version">flipple v0.2.3</div>

  <script src="config.js" defer></script>
  <script src="app.js" defer></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {
          // PWA registration is optional; the game still works if it fails.
        });
      });
    }
  </script>
</body>
</html>
